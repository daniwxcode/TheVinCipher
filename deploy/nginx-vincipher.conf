# /etc/nginx/sites-available/vincipher
# Nginx reverse proxy for VinCipher .NET app
# Install: sudo cp nginx-vincipher.conf /etc/nginx/sites-available/vincipher
#          sudo ln -s /etc/nginx/sites-available/vincipher /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS:     sudo certbot --nginx -d vincipher.com -d www.vincipher.com

server {
    listen 80;
    listen [::]:80;
    server_name vincipher.com www.vincipher.com;

    # Redirect HTTP ? HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        keep-alive;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # Static files — serve directly for performance
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Block direct access to sensitive paths
    location ~ /\. {
        deny all;
    }
}

