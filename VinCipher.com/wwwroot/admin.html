<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VinCipher Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--surface:#18181b;--surface2:#27272a;--border:#27272a;--text:#fafafa;--muted:#a1a1aa;--dim:#71717a;--accent:#7c3aed;--accent-l:#8b5cf6;--green:#4ade80;--red:#ef4444;--font:'Inter',-apple-system,sans-serif;--radius:10px}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent-l);text-decoration:none}
.app{max-width:1100px;margin:0 auto;padding:24px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.03em}
.header h1 span{color:var(--accent-l)}
.header-actions{display:flex;align-items:center;gap:12px}
.badge{padding:3px 10px;font-size:11px;font-weight:600;border-radius:20px;background:rgba(124,58,237,.15);color:var(--accent-l)}
.badge.root{background:rgba(74,222,128,.12);color:var(--green)}

/* Login */
.login-box{max-width:380px;margin:80px auto;padding:32px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.login-box h2{font-size:20px;margin-bottom:20px;text-align:center}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;font-size:14px;font-family:var(--font);color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;outline:none}
.form-input:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;font-size:14px;font-weight:600;font-family:var(--font);border:none;border-radius:20px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-l)}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-ghost{background:none;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2)}
.btn-green{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.2)}.btn-green:hover{background:rgba(74,222,128,.2)}
.error-msg{color:var(--red);font-size:13px;margin-top:8px;text-align:center}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);text-align:center}
.stat-value{font-size:32px;font-weight:800;color:var(--accent-l);letter-spacing:-.03em}
.stat-label{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:4px}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:10px 20px;font-size:14px;font-weight:600;color:var(--dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font)}
.tab.active{color:var(--accent-l);border-bottom-color:var(--accent)}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--dim);font-weight:600;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 12px;border-bottom:1px solid rgba(39,39,42,.5)}
tr:hover td{background:rgba(124,58,237,.03)}
.mono{font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:var(--muted)}
.status-active{color:var(--green)}.status-revoked{color:var(--red)}.status-expired{color:var(--dim)}

/* Detail panel */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}
.detail-row span:first-child{color:var(--dim)}
.section-title{font-size:15px;font-weight:700;margin:20px 0 12px;display:flex;align-items:center;justify-content:space-between}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:300;padding:12px 20px;font-size:14px;font-weight:500;font-family:var(--font);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.visible{transform:translateY(0);opacity:1;pointer-events:auto}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:440px;padding:28px;animation:modal-in .25s ease}
@keyframes modal-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal h3{font-size:18px;margin-bottom:20px}

.hidden{display:none!important}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr}.app{padding:16px}}
</style>
</head>
<body>

<!-- Login screen -->
<div id="loginScreen" class="login-box">
    <h2>&#128274; VinCipher Admin</h2>
    <form onsubmit="return Admin.login(event)">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" id="loginUser" required autocomplete="username">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="loginPass" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Connexion</button>
        <div class="error-msg" id="loginError"></div>
    </form>
</div>

<!-- Main app -->
<div id="mainApp" class="app hidden">
    <div class="header">
        <h1>VinCipher <span>Admin</span></h1>
        <div class="header-actions">
            <span class="badge" id="adminBadge"></span>
            <button class="btn btn-ghost btn-sm" onclick="Admin.logout()">D&eacute;connexion</button>
        </div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="tabs">
        <button class="tab active" data-tab="accounts" onclick="Admin.switchTab('accounts')">Comptes</button>
        <button class="tab" data-tab="admins" onclick="Admin.switchTab('admins')">Administrateurs</button>
    </div>

    <!-- Accounts tab -->
    <div id="tab-accounts">
        <div id="accountsList"></div>
        <div id="accountDetail" class="hidden"></div>
    </div>

    <!-- Admins tab -->
    <div id="tab-admins" class="hidden">
        <div class="section-title">
            Utilisateurs administrateurs
            <button class="btn btn-primary btn-sm" id="btnCreateAdmin" onclick="Admin.showCreateAdmin()">+ Nouvel admin</button>
        </div>
        <div id="adminsList"></div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const Admin = (() => {
    const KEY = 'vincipher_admin_session';
    let _isRoot = false;

    function getSession() { return localStorage.getItem(KEY); }
    function setSession(k) { localStorage.setItem(KEY, k); }
    function clearSession() { localStorage.removeItem(KEY); }
    function headers() { return { 'X-Admin-Key': getSession(), 'Content-Type': 'application/json' }; }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtDate(iso) { return new Date(iso).toLocaleString('fr-FR', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); }

    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 3000);
    }

    function showModal(html) {
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.add('active');
    }
    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    document.getElementById('modal')?.addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ?? Login ??
    async function login(e) {
        e.preventDefault();
        document.getElementById('loginError').textContent = '';
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value;
        try {
            const res = await fetch('/api/Admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!res.ok) { document.getElementById('loginError').textContent = data.error || 'Erreur'; return false; }
            setSession(data.sessionKey);
            _isRoot = data.isRoot;
            showApp(data.username, data.isRoot);
        } catch { document.getElementById('loginError').textContent = 'Erreur r\u00e9seau.'; }
        return false;
    }

    async function logout() {
        try { await fetch('/api/Admin/logout', { method: 'POST', headers: headers() }); } catch {}
        clearSession();
        location.reload();
    }

    function showApp(username, isRoot) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        const badge = document.getElementById('adminBadge');
        badge.textContent = username + (isRoot ? ' (root)' : '');
        badge.classList.toggle('root', isRoot);
        document.getElementById('btnCreateAdmin').classList.toggle('hidden', !isRoot);
        loadStats();
        loadAccounts();
    }

    // ?? Init check ??
    async function init() {
        if (!getSession()) return;
        try {
            const res = await fetch('/api/Admin/stats', { headers: headers() });
            if (res.ok) {
                // session still valid, detect root from admins list
                const adminsRes = await fetch('/api/Admin/admins', { headers: headers() });
                if (adminsRes.ok) {
                    const d = await adminsRes.json();
                    const me = d.admins?.find(a => a.hasActiveSession);
                    _isRoot = me?.isRoot ?? false;
                    showApp(me?.username ?? 'admin', _isRoot);
                }
            } else { clearSession(); }
        } catch { clearSession(); }
    }

    // ?? Stats ??
    async function loadStats() {
        const res = await fetch('/api/Admin/stats', { headers: headers() });
        if (!res.ok) return;
        const s = await res.json();
        document.getElementById('statsGrid').innerHTML = [
            ['totalAccounts', 'Comptes'],
            ['activeTokens', 'Tokens actifs'],
            ['totalRequests', 'Requ\u00eates totales'],
            ['todayRequests', 'Aujourd\u2019hui'],
            ['totalAdmins', 'Admins']
        ].map(([k, l]) => `<div class="stat-card"><div class="stat-value">${s[k]??0}</div><div class="stat-label">${l}</div></div>`).join('');
    }

    // ?? Tabs ??
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.getElementById('tab-accounts').classList.toggle('hidden', tab !== 'accounts');
        document.getElementById('tab-admins').classList.toggle('hidden', tab !== 'admins');
        if (tab === 'accounts') { loadAccounts(); }
        if (tab === 'admins') { loadAdmins(); }
    }

    // ?? Accounts list ??
    async function loadAccounts() {
        document.getElementById('accountDetail').classList.add('hidden');
        const res = await fetch('/api/Admin/accounts?size=50', { headers: headers() });
        if (!res.ok) return;
        const d = await res.json();
        const el = document.getElementById('accountsList');
        if (!d.accounts.length) { el.innerHTML = '<p style="color:var(--dim);text-align:center;padding:40px">Aucun compte.</p>'; return; }
        el.innerHTML = `<div class="table-wrap"><table>
            <thead><tr><th>Nom</th><th>Email</th><th>Domaine</th><th>Tokens</th><th>Requ\u00eates</th><th>Cr\u00e9\u00e9</th><th></th></tr></thead>
            <tbody>${d.accounts.map(a => `<tr>
                <td>${esc(a.name)}</td><td class="mono">${esc(a.email)}</td><td>${esc(a.domain)}</td>
                <td>${a.activeTokens}/${a.totalTokens}</td><td>${a.totalRequests}</td>
                <td>${fmtDate(a.createdAt)}</td>
                <td><button class="btn btn-ghost btn-sm" onclick="Admin.viewAccount('${a.id}')">D\u00e9tails</button>
                    <button class="btn btn-danger btn-sm" onclick="Admin.deleteAccount('${a.id}','${esc(a.email)}')">Suppr.</button></td>
            </tr>`).join('')}</tbody></table></div>`;
    }

    // ?? Account detail ??
    async function viewAccount(id) {
        const res = await fetch(`/api/Admin/accounts/${id}`, { headers: headers() });
        if (!res.ok) { showToast('Erreur chargement'); return; }
        const d = await res.json();
        const a = d.account;
        const el = document.getElementById('accountDetail');
        el.classList.remove('hidden');
        el.innerHTML = `
            <div class="detail-panel">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <h3 style="font-size:18px">${esc(a.name)}</h3>
                    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('accountDetail').classList.add('hidden')">&times; Fermer</button>
                </div>
                <div class="detail-row"><span>Email</span><span>${esc(a.email)}</span></div>
                <div class="detail-row"><span>T\u00e9l\u00e9phone</span><span>${esc(a.phone)}</span></div>
                <div class="detail-row"><span>Domaine</span><span>${esc(a.domain)}</span></div>
                <div class="detail-row"><span>Cr\u00e9\u00e9</span><span>${fmtDate(a.createdAtUtc)}</span></div>
                <div class="detail-row"><span>Requ\u00eates totales</span><span>${d.totalRequests}</span></div>

                <div class="section-title">Tokens <button class="btn btn-primary btn-sm" onclick="Admin.showCreateToken('${a.id}')">+ Cr\u00e9er</button></div>
                <div class="table-wrap"><table>
                    <thead><tr><th>Cl\u00e9</th><th>Nom</th><th>Statut</th><th>Expire</th><th></th></tr></thead>
                    <tbody>${d.tokens.map(t => {
                        const expired = new Date(t.expiresAtUtc) < new Date();
                        const status = !t.isActive ? 'revoked' : expired ? 'expired' : 'active';
                        const statusLabel = status === 'active' ? 'Actif' : status === 'expired' ? 'Expir\u00e9' : 'R\u00e9voqu\u00e9';
                        return `<tr>
                            <td class="mono" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(t.key)}</td>
                            <td>${esc(t.name)}</td>
                            <td><span class="status-${status}">${statusLabel}</span></td>
                            <td>${fmtDate(t.expiresAtUtc)}</td>
                            <td style="white-space:nowrap">
                                ${t.isActive ? `<button class="btn btn-danger btn-sm" onclick="Admin.revokeToken('${a.id}','${t.id}')">R\u00e9voquer</button>` : ''}
                                <button class="btn btn-green btn-sm" onclick="Admin.showExtendToken('${a.id}','${t.id}')">Prolonger</button>
                            </td>
                        </tr>`;
                    }).join('')}</tbody></table></div>

                <div class="section-title">Derni\u00e8res requ\u00eates</div>
                ${d.recentLogs.length ? `<div class="table-wrap"><table>
                    <thead><tr><th>VIN</th><th>Statut</th><th>Temps</th><th>Date</th></tr></thead>
                    <tbody>${d.recentLogs.map(l => `<tr>
                        <td class="mono">${esc(l.vin)}</td>
                        <td><span style="color:${l.success?'var(--green)':'var(--red)'}">${l.statusCode}</span></td>
                        <td>${l.responseTimeMs}ms</td>
                        <td>${fmtDate(l.timestamp)}</td>
                    </tr>`).join('')}</tbody></table></div>` : '<p style="color:var(--dim);font-size:13px">Aucune requ\u00eate.</p>'}
            </div>`;
    }

    async function deleteAccount(id, email) {
        if (!confirm(`Supprimer le compte ${email} et toutes ses donn\u00e9es ?`)) return;
        const res = await fetch(`/api/Admin/accounts/${id}`, { method: 'DELETE', headers: headers() });
        if (res.ok) { showToast('Compte supprim\u00e9.'); loadAccounts(); loadStats(); }
        else { const d = await res.json(); showToast(d.error || 'Erreur'); }
    }

    // ?? Token actions ??
    function showCreateToken(accountId) {
        showModal(`<h3>Cr\u00e9er un token</h3>
            <div class="form-group"><label class="form-label">Nom</label><input class="form-input" id="ctName" value="Admin-created"></div>
            <div class="form-group"><label class="form-label">Dur\u00e9e (jours)</label><input class="form-input" type="number" id="ctDays" value="1" min="1" max="365"></div>
            <div style="display:flex;gap:8px;margin-top:16px">
                <button class="btn btn-primary" onclick="Admin.createToken('${accountId}')">Cr\u00e9er</button>
                <button class="btn btn-ghost" onclick="Admin.closeModal()">Annuler</button>
            </div>`);
    }

    async function createToken(accountId) {
        const name = document.getElementById('ctName').value.trim();
        const days = parseInt(document.getElementById('ctDays').value) || 1;
        const res = await fetch(`/api/Admin/accounts/${accountId}/tokens`, {
            method: 'POST', headers: headers(),
            body: JSON.stringify({ name, durationDays: days })
        });
        if (res.ok) { closeModal(); showToast('Token cr\u00e9\u00e9.'); viewAccount(accountId); }
        else { const d = await res.json(); showToast(d.error || 'Erreur'); }
    }

    async function revokeToken(accountId, tokenId) {
        if (!confirm('R\u00e9voquer ce token ?')) return;
        const res = await fetch(`/api/Admin/accounts/${accountId}/tokens/${tokenId}/revoke`, { method: 'POST', headers: headers() });
        if (res.ok) { showToast('Token r\u00e9voqu\u00e9.'); viewAccount(accountId); }
        else { const d = await res.json(); showToast(d.error || 'Erreur'); }
    }

    function showExtendToken(accountId, tokenId) {
        showModal(`<h3>Prolonger le token</h3>
            <div class="form-group"><label class="form-label">Jours suppl\u00e9mentaires</label><input class="form-input" type="number" id="extDays" value="7" min="1" max="365"></div>
            <div style="display:flex;gap:8px;margin-top:16px">
                <button class="btn btn-primary" onclick="Admin.extendToken('${accountId}','${tokenId}')">Prolonger</button>
                <button class="btn btn-ghost" onclick="Admin.closeModal()">Annuler</button>
            </div>`);
    }

    async function extendToken(accountId, tokenId) {
        const days = parseInt(document.getElementById('extDays').value) || 7;
        const res = await fetch(`/api/Admin/accounts/${accountId}/tokens/${tokenId}/extend`, {
            method: 'POST', headers: headers(),
            body: JSON.stringify({ additionalDays: days })
        });
        if (res.ok) { closeModal(); showToast('Token prolong\u00e9.'); viewAccount(accountId); }
        else { const d = await res.json(); showToast(d.error || 'Erreur'); }
    }

    // ?? Admins ??
    async function loadAdmins() {
        const res = await fetch('/api/Admin/admins', { headers: headers() });
        if (!res.ok) return;
        const d = await res.json();
        document.getElementById('adminsList').innerHTML = `<div class="table-wrap"><table>
            <thead><tr><th>Username</th><th>R\u00f4le</th><th>Cr\u00e9\u00e9</th><th>Session</th><th></th></tr></thead>
            <tbody>${d.admins.map(a => `<tr>
                <td><strong>${esc(a.username)}</strong></td>
                <td>${a.isRoot ? '<span class="badge root">root</span>' : '<span class="badge">admin</span>'}</td>
                <td>${fmtDate(a.createdAtUtc)}</td>
                <td><span style="color:${a.hasActiveSession?'var(--green)':'var(--dim)'}">${a.hasActiveSession?'Active':'Inactive'}</span></td>
                <td>${!a.isRoot && _isRoot ? `<button class="btn btn-danger btn-sm" onclick="Admin.deleteAdmin('${a.id}','${esc(a.username)}')">Suppr.</button>` : ''}</td>
            </tr>`).join('')}</tbody></table></div>`;
    }

    function showCreateAdmin() {
        showModal(`<h3>Nouvel administrateur</h3>
            <div class="form-group"><label class="form-label">Username</label><input class="form-input" id="newAdminUser" required></div>
            <div class="form-group"><label class="form-label">Mot de passe (min 8 car.)</label><input class="form-input" type="password" id="newAdminPass" required></div>
            <div class="error-msg" id="createAdminErr"></div>
            <div style="display:flex;gap:8px;margin-top:16px">
                <button class="btn btn-primary" onclick="Admin.createAdmin()">Cr\u00e9er</button>
                <button class="btn btn-ghost" onclick="Admin.closeModal()">Annuler</button>
            </div>`);
    }

    async function createAdmin() {
        const username = document.getElementById('newAdminUser').value.trim();
        const password = document.getElementById('newAdminPass').value;
        const errEl = document.getElementById('createAdminErr');
        errEl.textContent = '';
        if (!username || password.length < 8) { errEl.textContent = 'Username requis, mot de passe min 8 car.'; return; }
        const res = await fetch('/api/Admin/admins', {
            method: 'POST', headers: headers(),
            body: JSON.stringify({ username, password })
        });
        const d = await res.json();
        if (res.ok) { closeModal(); showToast(`Admin ${username} cr\u00e9\u00e9.`); loadAdmins(); }
        else { errEl.textContent = d.error || 'Erreur'; }
    }

    async function deleteAdmin(id, username) {
        if (!confirm(`Supprimer l'admin ${username} ?`)) return;
        const res = await fetch(`/api/Admin/admins/${id}`, { method: 'DELETE', headers: headers() });
        if (res.ok) { showToast(`Admin ${username} supprim\u00e9.`); loadAdmins(); loadStats(); }
        else { const d = await res.json(); showToast(d.error || 'Erreur'); }
    }

    init();

    return {
        login, logout, switchTab,
        loadAccounts, viewAccount, deleteAccount,
        showCreateToken, createToken, revokeToken,
        showExtendToken, extendToken,
        loadAdmins, showCreateAdmin, createAdmin, deleteAdmin,
        closeModal
    };
})();
</script>
</body>
</html>
